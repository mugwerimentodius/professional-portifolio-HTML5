<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Mugweri Mentodius Portfolio</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

header{
    background:linear-gradient(to right, red, green, yellow);
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#222;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}

nav a:hover{
    color:yellow;
}

.container{
    width:90%;
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:green;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:12px;
    background:red;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:green;
}

.contact-info{
    margin-top:25px;
    text-align:center;
    line-height:1.8;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
    <h1>Contact Mugweri Mentodius</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="data.html">Data</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h2>Send Me a Message</h2>

    <form onsubmit="return validateForm()">
        <input type="text" id="name" placeholder="Enter your full name">
        <input type="email" id="email" placeholder="Enter your email">
        <input type="text" id="phone" placeholder="Enter your phone number">
        <textarea id="message" placeholder="Write your message"></textarea>
        <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
        <p><strong>Phone:</strong> 0743182927</p>
        <p><strong>Email:</strong> mugwerimentodius@gmail.com</p>
        <p><strong>Location:</strong> Kamuli Eastern Uganda</p>
    </div>
</div>

<footer>
    <p>&copy; 2026 Mugweri Mentodius | All Rights Reserved</p>
</footer>

<script>
function validateForm(){
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let message = document.getElementById("message").value;

    if(name=="" || email=="" || phone=="" || message==""){
        alert("Please fill in all fields.");
        return false;
    }

    alert("Message sent successfully!");
    return true;
}
</script>

</body>
</html>
